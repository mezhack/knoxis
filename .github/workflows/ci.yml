name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: knoxis_test
          POSTGRES_USER: knoxis
          POSTGRES_PASSWORD: knoxis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Formato (black)
        run: black --check .

      - name: Migrate (primeira vez)
        env:
          DJANGO_SETTINGS_MODULE: knoxis.settings.dev
          DATABASE_URL: postgresql://knoxis:knoxis@localhost:5432/knoxis_test
          SECRET_KEY: ci-secret-key
          CPF_HMAC_KEY: ci-hmac-key
        run: python manage.py migrate --noinput

      - name: Double-migrate (idempotência)
        env:
          DJANGO_SETTINGS_MODULE: knoxis.settings.dev
          DATABASE_URL: postgresql://knoxis:knoxis@localhost:5432/knoxis_test
          SECRET_KEY: ci-secret-key
          CPF_HMAC_KEY: ci-hmac-key
        run: |
          output=$(python manage.py migrate --noinput 2>&1)
          echo "$output"
          echo "$output" | grep -q "No migrations to apply" || (echo "FALHA: segunda migration aplicou algo" && exit 1)

      - name: Testes
        env:
          DJANGO_SETTINGS_MODULE: knoxis.settings.dev
          DATABASE_URL: postgresql://knoxis:knoxis@localhost:5432/knoxis_test
          SECRET_KEY: ci-secret-key
          CPF_HMAC_KEY: ci-hmac-key
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm run test

      - name: Build
        run: npm run build
