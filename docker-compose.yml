services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knoxis
      POSTGRES_USER: knoxis
      POSTGRES_PASSWORD: knoxis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knoxis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DJANGO_SETTINGS_MODULE: knoxis.settings.dev
      SECRET_KEY: dev-secret-key-change-in-production
      CPF_HMAC_KEY: dev-hmac-key-change-in-production
      POSTGRES_DB: knoxis
      POSTGRES_USER: knoxis
      POSTGRES_PASSWORD: knoxis
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
  node_modules:
